services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: kyt
      POSTGRES_PASSWORD: kyt
      POSTGRES_DB: kyt
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kyt -d kyt"]
      interval: 5s
      timeout: 3s
      retries: 10
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  kyt:
    build: .
    environment:
      DB_URL: postgres://kyt:kyt@postgres:5432/kyt?sslmode=disable
      REDIS_URL: redis://redis:6379
      PORT: "8080"
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  pgdata: